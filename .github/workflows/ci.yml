name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run mobile:typecheck
      - run: npm run mobile:test

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e "apps/api[dev]"
      - run: cd apps/api && alembic heads
      - run: cd apps/api && ruff check app tests
      - run: cd apps/api && pytest
