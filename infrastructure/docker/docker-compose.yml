services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: living
      POSTGRES_PASSWORD: living
      POSTGRES_DB: living_nutrition
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../../apps/api
    env_file:
      - ../../apps/api/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/api:/app
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
