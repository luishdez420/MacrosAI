# Free Render preview Blueprint.
#
# This intentionally deploys only a sleeping web API and a temporary free
# Postgres database. It is for personal testing, not production use. Camera
# and nutrition-label AI are disabled so no OpenAI request can be made, and
# workers, Redis, R2, audit delivery, and Sentry are deliberately omitted.
#
# The preserved paid production topology is in render.production.yaml.

services:
  - type: web
    name: living-nutrition-preview-api
    runtime: docker
    region: oregon
    plan: free
    dockerContext: ./apps/api
    dockerfilePath: ./apps/api/Dockerfile
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    buildFilter:
      paths:
        - apps/api/**
        - render.yaml
    envVars:
      - key: ENVIRONMENT
        value: preview
      - key: DATABASE_URL
        fromDatabase:
          name: living-nutrition-preview-postgres
          property: connectionString
      # The free service has no pre-deploy hook. This is safe for a disposable
      # preview database and lets it recover after the service sleeps.
      - key: AUTO_MIGRATE_ON_STARTUP
        value: "true"
      - key: IDENTITY_PROVIDER
        value: clerk
      - key: ALLOW_DEV_AUTH
        value: "false"
      - key: ALLOW_LEGACY_LOCAL_TOKENS
        value: "false"
      - key: E2E_FIXTURE_MODE
        value: "false"
      - key: AI_FEATURES_ENABLED
        value: "false"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_BACKEND
        value: memory
      - key: NUTRITION_PROVIDER_CIRCUIT_BREAKER_BACKEND
        value: memory
      - key: AUDIT_DELIVERY_BACKEND
        value: disabled
      - key: IMAGE_STORAGE_BACKEND
        value: local
      # These are public identity configuration values, but remain managed in
      # Render rather than being committed with a tenant-specific URL.
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false

databases:
  - name: living-nutrition-preview-postgres
    region: oregon
    plan: free
    databaseName: living_nutrition_preview
    user: living_nutrition_preview
    ipAllowList: []
