      - key: IMAGE_STORAGE_S3_SECRET_ACCESS_KEY
        fromService: { type: web, name: living-nutrition-api, envVarKey: IMAGE_STORAGE_S3_SECRET_ACCESS_KEY }

  - type: keyvalue
    name: living-nutrition-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction
    # Render private-network connections continue to work with no public access.
    ipAllowList: []

databases:
  - name: living-nutrition-postgres
    region: oregon
    plan: basic-1gb
    databaseName: living_nutrition
    user: living_nutrition
    ipAllowList: []
